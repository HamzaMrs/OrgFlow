version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: orgflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-orgflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orgflow}
      POSTGRES_DB: ${POSTGRES_DB:-orgflow}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - orgflow_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orgflow} -d ${POSTGRES_DB:-orgflow}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: orgflow-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4000
      DATABASE_URL: postgres://${POSTGRES_USER:-orgflow}:${POSTGRES_PASSWORD:-orgflow}@db:5432/${POSTGRES_DB:-orgflow}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    ports:
      - "${BACKEND_PORT:-4000}:4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/api}
    container_name: orgflow-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/api}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"

volumes:
  orgflow_db_data:
